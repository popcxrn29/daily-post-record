<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบบันทึกโพสต์ (กรีเน่ยังอยู่)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4A90E2; --secondary: #27ae60; --pink: #FF69B4; --orange: #f39c12; --danger: #e74c3c; --bg: #F0F2F5; --card-bg: #ffffff; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .main-container { width: 100%; max-width: 480px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid transparent; }
        input[type="date"] { width: 80%; padding: 10px; border-radius: 10px; border: 2px solid #E0E6ED; font-size: 1rem; text-align: center; outline: none; }
        .dashboard { background: white; border: 2px solid var(--pink); color: #333; }
        .dash-grid { display: grid; grid-template-columns: 1fr auto; gap: 5px; font-size: 0.82rem; margin-top: 10px; }
        .dash-item { border-bottom: 1px solid #ffe4f1; padding: 4px 0; }
        .dash-title { color: var(--pink); font-weight: bold; font-size: 1rem; margin: 0; }
        .random-box { background: linear-gradient(135deg, #6e8efb, #a777e3); padding: 25px; border-radius: 20px; color: white; text-align: center; margin-bottom: 15px; }
        .btn-random { background: white; color: #6e8efb; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.1rem; }
        .row { display: grid; grid-template-columns: 55px 1fr 65px; gap: 8px; margin-bottom: 8px; align-items: center; }
        input[readonly] { background-color: #f9f9f9; border: 1px solid #eee; padding: 8px; border-radius: 8px; font-size: 0.8rem; }
        input[type="number"] { padding: 8px; border: 1px solid #E0E6ED; border-radius: 8px; text-align: center; font-weight: bold; }
        .btn-save { background: var(--secondary); color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .history-card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--pink); }
        .h-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .h-item { display: grid; grid-template-columns: 45px 1fr 35px; font-size: 0.8rem; padding: 3px 0; border-bottom: 1px solid #f9f9f9; }
        .section-title { font-size: 0.85rem; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card" style="text-align:center">
        <h2 style="color:var(--primary); margin:0 0 10px 0;">📊 บันทึกยอดโพสต์</h2>
        <input id="date" type="date" onchange="checkTodayStatus()">
    </div>

    <div id="randomBox" class="random-box">
        <button class="btn-random" onclick="startRandom()">🎲 สุ่มทรัพย์ (บ้านเอื้ออาทร + กรีเน่ + อื่นๆ)</button>
    </div>

    <div id="inputSection" class="card" style="display: none;">
        <div class="section-title" style="color:var(--primary)">👤 พี่ขวัญ</div>
        <div class="row"><span>เช้า</span><input id="kw_m_name" readonly><input id="kw_m_num" type="number"></div>
        <div class="row"><span>เที่ยง</span><input id="kw_n_name" readonly><input id="kw_n_num" type="number"></div>
        <div class="row"><span>เย็น</span><input id="kw_e_name" readonly><input id="kw_e_num" type="number"></div>
        <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
        <div class="section-title" style="color:var(--orange)">👤 พี่สุ</div>
        <div class="row"><span>เช้า</span><input id="su_m_name" readonly><input id="su_m_num" type="number"></div>
        <div class="row"><span>เที่ยง</span><input id="su_n_name" readonly><input id="su_n_num" type="number"></div>
        <div class="row"><span>เย็น</span><input id="su_e_name" readonly><input id="su_e_num" type="number"></div>
        <button class="btn-save" onclick="saveData()">💾 บันทึกจำนวนโพสต์</button>
    </div>

    <div id="dashCard" class="card dashboard">
        <p class="dash-title">📈 สถิติทรัพย์เดือนนี้</p>
        <div id="dashContent" class="dash-grid"></div>
    </div>

    <div id="historyList"></div>
    <button id="loadAllBtn" style="width:100%; padding:15px; background:#ddd; border:none; border-radius:15px; color:#444; font-weight:bold; cursor:pointer; margin-bottom:50px;" onclick="loadHistory(true)">📜 ดูประวัติทั้งหมด</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCSncboyEoURJMOSx9fk8qEClmuQ_PgwDI",
  authDomain: "save-data-92eca.firebaseapp.com",
  projectId: "save-data-92eca",
  storageBucket: "save-data-92eca.firebasestorage.app",
  messagingSenderId: "661096454777",
  appId: "1:661096454777:web:d8b4297db798e14b76d2a8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ฐานข้อมูล (นำ กรี เน่ กลับมาแล้ว)
const allAssets = ["บ้านพี่แดง อรัญนคร3", "แม่ย่าพี่ปลา 14 ไร่", "แม่ย่าพี่ปลา 11 ไร่", "พี่ศรีไพร (คอนสาย)", "พี่แอน ห้องเช่า 3 ห้อง", "พี่แอน ห้องเช่า 9 ห้อง", "ที่ดินน้าจิต วังน้ำเย็น", "บ้านอรัญนคร 1", "คอนโดชีวาทัย ฮอล์มาร์ค", "ที่ดิน หลังอรัญนคร 1", "บ้านพี่หนึ่ง อรัญวิลล์", "บ้านเอื้ออาทร", "โกดัง 1 ไร่", "คอนโด The Base Park East", "คอนโด Aston", "ที่ดินบ้านนา นครนายก", "บ้านพรสิริ ขอนแก่น", "บ้านพี่ปองพระประแดง", "บ้านทาวน์โฮมพฤกษา9", "BANGKOK HORIZON รามคำแหง", "กรี เน่ คอนโดดอนเมือง", "คอนโดสุขุมวิท 49"];

let currentDocId = null;

async function checkTodayStatus() {
    const dateVal = document.getElementById("date").value;
    if(!dateVal) return;
    const snap = await db.collection("posts").where("date", "==", dateVal).get();
    if (!snap.empty) {
        currentDocId = snap.docs[0].id;
        document.getElementById("randomBox").style.display = "none";
        document.getElementById("inputSection").style.display = "block";
        fillForm(snap.docs[0].data());
    } else {
        currentDocId = null;
        document.getElementById("randomBox").style.display = "block";
        document.getElementById("inputSection").style.display = "none";
    }
    updateDashboard();
    loadHistory(false);
}

function fillForm(d) {
    document.getElementById("kw_m_name").value = d.kw.m.name; document.getElementById("kw_m_num").value = d.kw.m.num || 0;
    document.getElementById("kw_n_name").value = d.kw.n.name; document.getElementById("kw_n_num").value = d.kw.n.num || 0;
    document.getElementById("kw_e_name").value = d.kw.e.name; document.getElementById("kw_e_num").value = d.kw.e.num || 0;
    document.getElementById("su_m_name").value = d.su.m.name; document.getElementById("su_m_num").value = d.su.m.num || 0;
    document.getElementById("su_n_name").value = d.su.n.name; document.getElementById("su_n_num").value = d.su.n.num || 0;
    document.getElementById("su_e_name").value = d.su.e.name; document.getElementById("su_e_num").value = d.su.e.num || 0;
}

async function startRandom() {
    const dateVal = document.getElementById("date").value;
    const currentMonth = dateVal.substring(0, 7);
    const fixed = "บ้านเอื้ออาทร";

    const monthSnap = await db.collection("posts").where("date", ">=", currentMonth + "-01").get();
    let stats = {}; allAssets.forEach(a => stats[a] = 0);
    monthSnap.forEach(doc => {
        const d = doc.data();
        [d.kw.m.name, d.kw.n.name, d.kw.e.name, d.su.m.name, d.su.n.name, d.su.e.name].forEach(n => { if(stats[n]!==undefined) stats[n]++; });
    });

    const historySnap = await db.collection("posts").orderBy("date", "desc").limit(7).get();
    let blackList = new Set();
    historySnap.forEach(doc => {
        const d = doc.data();
        [d.kw.m.name, d.kw.n.name, d.kw.e.name, d.su.m.name, d.su.n.name, d.su.e.name].forEach(n => { if(n !== fixed) blackList.add(n); });
    });

    // กรองทรัพย์อื่น (ห้ามเป็นบ้านเอื้อ และไม่ซ้ำ 7 วัน)
    let pool = allAssets.filter(a => a !== fixed && !blackList.has(a));
    pool.sort((a, b) => stats[a] - stats[b]);

    let chosenPool = pool.slice(0, 5); 
    let final2 = [];
    for(let i=0; i<2; i++) {
        const idx = Math.floor(Math.random() * chosenPool.length);
        final2.push(chosenPool.splice(idx, 1)[0]);
    }

    // จัดชุดให้พี่ขวัญล็อคบ้านเอื้ออาทรที่เช้า | พี่สุสุ่มใหม่หมด
    const assets = [fixed, final2[0], final2[1]];

    await db.collection("posts").add({
        date: dateVal,
        kw: { m:{name:assets[0], num:0}, n:{name:assets[1], num:0}, e:{name:assets[2], num:0} },
        su: { m:{name:assets[1], num:0}, n:{name:assets[2], num:0}, e:{name:assets[0], num:0} }
    });
    checkTodayStatus();
}

async function updateDashboard() {
    const currentMonth = document.getElementById("date").value.substring(0, 7);
    const snap = await db.collection("posts").where("date", ">=", currentMonth + "-01").get();
    let stats = {};
    snap.forEach(doc => {
        const d = doc.data();
        [d.kw, d.su].forEach(p => ['m','n','e'].forEach(t => { 
            const n = p[t].name; stats[n] = (stats[n] || 0) + (p[t].num || 0); 
        }));
    });
    let html = Object.entries(stats).sort((a,b) => b[1]-a[1])
        .map(([n, c]) => `<div class="dash-item">${n}</div><div class="dash-item" style="text-align:right"><b>${c}</b></div>`).join('');
    document.getElementById("dashContent").innerHTML = html || "ยังไม่มีข้อมูลเดือนนี้";
}

async function loadHistory(showAll) {
    const dateVal = document.getElementById("date").value;
    const currentMonth = dateVal.substring(0, 7);
    let query = db.collection("posts").orderBy("date", "desc");
    if (!showAll) query = query.where("date", ">=", currentMonth + "-01");
    
    const snap = await query.get();
    let html = "";
    snap.forEach(doc => {
        const d = doc.data();
        html += `<div class="history-card">
            <div class="h-header"><strong>🗓 ${d.date}</strong> 
            <button style="color:var(--primary); border:none; background:none; font-weight:bold; cursor:pointer;" onclick="setEdit('${d.date}')">แก้ไข</button></div>
            <div class="section-title" style="color:var(--primary)">พี่ขวัญ</div>
            <div class="h-item"><span>เช้า</span><span>${d.kw.m.name}</span><span style="text-align:right"><b>${d.kw.m.num}</b></span></div>
            <div class="h-item"><span>เที่ยง</span><span>${d.kw.n.name}</span><span style="text-align:right"><b>${d.kw.n.num}</b></span></div>
            <div class="h-item"><span>เย็น</span><span>${d.kw.e.name}</span><span style="text-align:right"><b>${d.kw.e.num}</b></span></div>
            <div class="section-title" style="color:var(--orange)">พี่สุ</div>
            <div class="h-item"><span>เช้า</span><span>${d.su.m.name}</span><span style="text-align:right"><b>${d.su.m.num}</b></span></div>
            <div class="h-item"><span>เที่ยง</span><span>${d.su.n.name}</span><span style="text-align:right"><b>${d.su.n.num}</b></span></div>
            <div class="section-title" style="color:var(--pink); font-size: 0.7rem;">(เย็น-สุ่มซ้ำเพื่อกระจายยอด)</div>
            <div class="h-item"><span>เย็น</span><span>${d.su.e.name}</span><span style="text-align:right"><b>${d.su.e.num}</b></span></div>
        </div>`;
    });
    document.getElementById("historyList").innerHTML = html;
}

async function saveData() {
    await db.collection("posts").doc(currentDocId).update({
        "kw.m.num": Number(document.getElementById("kw_m_num").value), "kw.n.num": Number(document.getElementById("kw_n_num").value), "kw.e.num": Number(document.getElementById("kw_e_num").value),
        "su.m.num": Number(document.getElementById("su_m_num").value), "su.n.num": Number(document.getElementById("su_n_num").value), "su.e.num": Number(document.getElementById("su_e_num").value)
    });
    alert("บันทึกเรียบร้อย!");
    checkTodayStatus();
}

function setEdit(date) { document.getElementById("date").value = date; checkTodayStatus(); window.scrollTo(0,0); }

window.onload = () => {
    document.getElementById("date").value = new Date().toISOString().split('T')[0];
    checkTodayStatus();
};
</script>
</body>
</html>
