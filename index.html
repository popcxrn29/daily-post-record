<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบบันทึกโพสต์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2; --secondary: #27ae60; --bg: #f0f2f5; --white: #ffffff;
        }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* Card หลัก */
        .card { background: var(--white); width: 100%; max-width: 450px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 20px; box-sizing: border-box; }
        
        /* แถบหัวเว็บ: วันที่ + ปุ่มสุ่ม (Compact) */
        .top-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; background: #f8f9fa; padding: 10px; border-radius: 15px; border: 1px solid #eee; }
        
        input[type="date"] { 
            flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 0.9rem; font-family: inherit; outline: none;
        }
        
        .btn-random { 
            flex: 1.5; background: linear-gradient(135deg, #6e8efb, #a777e3); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(110, 142, 251, 0.2);
        }
        .btn-random:active { transform: scale(0.95); }

        /* ส่วนกรอกข้อมูล */
        .person-section { margin-bottom: 15px; }
        .person-title { font-weight: bold; font-size: 1rem; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        
        .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .time-label { min-width: 40px; font-size: 0.8rem; color: #888; font-weight: bold; }
        
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #eee; border-radius: 10px; font-size: 0.9rem; background: #fafafa; }
        input[type="number"] { width: 55px; padding: 10px; border: 1px solid #eee; border-radius: 10px; text-align: center; font-size: 0.9rem; }

        .btn-save { background: var(--secondary); color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(39, 174, 96, 0.2); }
        .btn-save:active { transform: translateY(2px); }

        /* ประวัติ */
        .history-list { width: 100%; max-width: 450px; margin-top: 15px; }
        .history-item { background: white; padding: 12px; border-radius: 15px; margin-bottom: 8px; border-left: 5px solid var(--primary); font-size: 0.85rem; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
    </style>
</head>
<body>

<div class="card">
    <h3 style="margin-top:0; color:#333; font-size:1.1rem; text-align:center;">📊 บันทึกโพสต์ & สุ่มทรัพย์</h3>

    <div class="top-bar">
        <input id="date" type="date">
        <button class="btn-random" onclick="handleRandom()">🎲 กดสุ่มทรัพย์</button>
    </div>

    <div class="person-section">
        <div class="person-title" style="color:var(--primary);">👤 พี่ขวัญ</div>
        <div class="row"><span class="time-label">เช้า</span><input id="kw_m_name" type="text"><input id="kw_m_num" type="number" placeholder="0"></div>
        <div class="row"><span class="time-label">เที่ยง</span><input id="kw_n_name" type="text"><input id="kw_n_num" type="number" placeholder="0"></div>
        <div class="row"><span class="time-label">เย็น</span><input id="kw_e_name" type="text"><input id="kw_e_num" type="number" placeholder="0"></div>
    </div>

    <div class="person-section">
        <div class="person-title" style="color:#E6A23C;">👤 พี่สุ</div>
        <div class="row"><span class="time-label">เช้า</span><input id="su_m_name" type="text"><input id="su_m_num" type="number" placeholder="0"></div>
        <div class="row"><span class="time-label">เที่ยง</span><input id="su_n_name" type="text"><input id="su_n_num" type="number" placeholder="0"></div>
        <div class="row"><span class="time-label">เย็น</span><input id="su_e_name" type="text"><input id="su_e_num" type="number" placeholder="0"></div>
    </div>

    <button class="btn-save" onclick="saveData()">💾 บันทึกและส่งข้อมูล</button>
</div>

<div class="history-list" id="historyList"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// Firebase Config ของคุณ
const firebaseConfig = {
  apiKey: "AIzaSyCSncboyEoURJMOSx9fk8qEClmuQ_PgwDI",
  authDomain: "save-data-92eca.firebaseapp.com",
  projectId: "save-data-92eca",
  storageBucket: "save-data-92eca.firebasestorage.app",
  messagingSenderId: "661096454777",
  appId: "1:661096454777:web:d8b4297db798e14b76d2a8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const allAssets = [
    "บ้านพี่แดง อรัญนคร3", "แม่ย่าพี่ปลา 14 ไร่", "แม่ย่าพี่ปลา 11 ไร่", "พี่ศรีไพร (คอนสาย)",
    "พี่แอน ห้องเช่า 3 ห้อง", "พี่แอน ห้องเช่า 9 ห้อง", "ที่ดินน้าจิต วังน้ำเย็น", "บ้านอรัญนคร 1 (คุณแคท )",
    "คอนโดชีวาทัย ฮอล์มาร์ค ลาดพร้าว-โชคชัย4(ฝน)", "ที่ดิน หลังอรัญนคร 1 ซ.ประสบโชค", 
    "บ้านพี่หนึ่ง อรัญวิลล์", "ที่ดินราชพัสดุ พี่แอน", "บ้านเอื้อ 214/278", "บ้านเอื้ื้อ 214/381",
    "บ้านเอื้อ 214/293", "โกดัง 1 ไร่ (พี่แอน)", "คอนโด The Base Park East Sukhumvit 77",
    "คอนโด Aston", "ที่ดินบ้านนา นครนายก", "บ้านพรสิริ ขอนแก่น", "บ้านพี่ปองพระประแดง",
    "แฮปปี้คอนโด", "บ้านทาวน์โฮมพฤกษา9", "BANGKOK HORIZON รามคำแหง",
    "THE IRIS ศรีนครินทร์ - พระราม 9", "กรี เน่ คอนโดดอนเมือง-สรงประภา เฟส1"
];

function handleRandom() {
    let temp = [...allAssets];
    let chosen = [];
    for (let i = 0; i < 3; i++) {
        const idx = Math.floor(Math.random() * temp.length);
        chosen.push(temp.splice(idx, 1)[0]);
    }
    // กรอกให้พี่ขวัญ
    document.getElementById("kw_m_name").value = chosen[0];
    document.getElementById("kw_n_name").value = chosen[1];
    document.getElementById("kw_e_name").value = chosen[2];
    // กรอกให้พี่สุ (สลับเวลา)
    document.getElementById("su_m_name").value = chosen[1];
    document.getElementById("su_n_name").value = chosen[2];
    document.getElementById("su_e_name").value = chosen[0];
}

function saveData() {
    const dateVal = document.getElementById("date").value;
    if (!dateVal) { alert("กรุณาเลือกวันที่!"); return; }

    const payload = {
        date: dateVal,
        kw: {
            m: { name: document.getElementById("kw_m_name").value, num: document.getElementById("kw_m_num").value || 0 },
            n: { name: document.getElementById("kw_n_name").value, num: document.getElementById("kw_n_num").value || 0 },
            e: { name: document.getElementById("kw_e_name").value, num: document.getElementById("kw_e_num").value || 0 }
        },
        su: {
            m: { name: document.getElementById("su_m_name").value, num: document.getElementById("su_m_num").value || 0 },
            n: { name: document.getElementById("su_n_name").value, num: document.getElementById("su_n_num").value || 0 },
            e: { name: document.getElementById("su_e_name").value, num: document.getElementById("su_e_num").value || 0 }
        },
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };

    db.collection("posts").add(payload).then(() => {
        alert("บันทึกสำเร็จ!");
        location.reload();
    });
}

function loadHistory() {
    db.collection("posts").orderBy("date", "desc").limit(5).get().then(snap => {
        let html = "";
        snap.forEach(doc => {
            const d = doc.data();
            html += `<div class="history-item"><b>📅 ${d.date}</b><br>ขวัญ: ${d.kw.m.num}, ${d.kw.n.num}, ${d.kw.e.num} | สุ: ${d.su.m.num}, ${d.su.n.num}, ${d.su.e.num}</div>`;
        });
        document.getElementById("historyList").innerHTML = html;
    });
}

window.onload = () => {
    loadHistory();
    document.getElementById("date").value = new Date().toISOString().split('T')[0];
};
</script>
</body>
</html>
