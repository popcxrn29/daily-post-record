<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>บันทึกโพสต์รายวัน</title>
    <style>
        :root { --primary: #27ae60; --bg: #f8f9fa; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); box-sizing: border-box; }
        h2 { text-align: center; color: #333; font-size: 1.4rem; margin-bottom: 20px; }
        .section-header { background: #e8f5e9; color: #2e7d32; padding: 8px 15px; border-radius: 10px; margin: 15px 0 10px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .label-time { min-width: 45px; font-size: 0.85rem; color: #666; align-self: center; }
        input, textarea { border: 1px solid #ddd; border-radius: 10px; padding: 10px; font-size: 14px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        input[type="text"] { flex: 2; min-width: 0; }
        input[type="number"] { width: 60px; text-align: center; }
        input[type="date"] { width: 100%; margin-bottom: 10px; background: #fff; cursor: pointer; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        .history-card { background: white; width: 100%; max-width: 400px; margin-top: 15px; padding: 15px; border-radius: 15px; border-left: 5px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; font-size: 0.9rem; }
        hr { border: 0; border-top: 1px solid #eee; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 บันทึกข้อมูลประจำวัน</h2>
    
    <strong>📅 วันที่</strong>
    <input id="date" type="date">

    <div class="section-header">👨🏻 พี่ขวัญ</div>
    <div class="input-group">
        <span class="label-time">🌅 เช้า</span>
        <input id="kw_m_name" type="text" placeholder="ชื่อทรัพย์">
        <input id="kw_m_num" type="number" placeholder="0">
    </div>
    <div class="input-group">
        <span class="label-time">☀️ เที่ยง</span>
        <input id="kw_n_name" type="text" placeholder="ชื่อทรัพย์">
        <input id="kw_n_num" type="number" placeholder="0">
    </div>
    <div class="input-group">
        <span class="label-time">🌙 เย็น</span>
        <input id="kw_e_name" type="text" placeholder="ชื่อทรัพย์">
        <input id="kw_e_num" type="number" placeholder="0">
    </div>

    <div class="section-header">👩 พี่สุ</div>
    <div class="input-group">
        <span class="label-time">🌅 เช้า</span>
        <input id="su_m_name" type="text" placeholder="ชื่อทรัพย์">
        <input id="su_m_num" type="number" placeholder="0">
    </div>
    <div class="input-group">
        <span class="label-time">☀️ เที่ยง</span>
        <input id="su_n_name" type="text" placeholder="ชื่อทรัพย์">
        <input id="su_n_num" type="number" placeholder="0">
    </div>
    <div class="input-group">
        <span class="label-time">🌙 เย็น</span>
        <input id="su_e_name" type="text" placeholder="ชื่อทรัพย์">
        <input id="su_e_num" type="number" placeholder="0">
    </div>

    <strong>📝 หมายเหตุ</strong>
    <textarea id="note" style="width:100%; margin-top:5px;" rows="2"></textarea>

    <button onclick="saveData()">💾 กดบันทึกข้อมูล</button>
</div>

<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// ก๊อปปี้ค่าจากหน้า Config ของคุณมาวางที่นี่
const firebaseConfig = {
  apiKey: "AIzaSyCSncboyEoURJMOSx9fk8qEClmuQ_PgwDI",
  authDomain: "save-data-92eca.firebaseapp.com",
  projectId: "save-data-92eca",
  storageBucket: "save-data-92eca.firebasestorage.app",
  messagingSenderId: "661096454777",
  appId: "1:661096454777:web:d8b4297db798e14b76d2a8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function saveData() {
    const dateVal = document.getElementById("date").value;
    if (!dateVal) { alert("กรุณาเลือกวันที่ก่อนบันทึกครับ"); return; }

    const payload = {
        date: dateVal,
        kw: {
            m: { name: document.getElementById("kw_m_name").value, num: document.getElementById("kw_m_num").value || 0 },
            n: { name: document.getElementById("kw_n_name").value, num: document.getElementById("kw_n_num").value || 0 },
            e: { name: document.getElementById("kw_e_name").value, num: document.getElementById("kw_e_num").value || 0 }
        },
        su: {
            m: { name: document.getElementById("su_m_name").value, num: document.getElementById("su_m_num").value || 0 },
            n: { name: document.getElementById("su_n_name").value, num: document.getElementById("su_n_num").value || 0 },
            e: { name: document.getElementById("su_e_name").value, num: document.getElementById("su_e_num").value || 0 }
        },
        note: document.getElementById("note").value,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    db.collection("daily_records").add(payload).then(() => {
        alert("✅ บันทึกข้อมูลสำเร็จแล้ว!");
        location.reload();
    }).catch((error) => {
        alert("❌ บันทึกไม่สำเร็จ: " + error.message);
    });
}

function fetchRecords() {
    db.collection("daily_records").orderBy("date", "desc").limit(5).get().then((querySnapshot) => {
        let content = "";
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            content += `
                <div class="history-card">
                    <b>📅 วันที่: ${data.date}</b><hr>
                    👨🏻 ขวัญ: ${data.kw.m.name}(${data.kw.m.num}), ${data.kw.n.name}(${data.kw.n.num}), ${data.kw.e.name}(${data.kw.e.num})<br>
                    👩‍💼 สุ: ${data.su.m.name}(${data.su.m.num}), ${data.su.n.name}(${data.su.n.num}), ${data.su.e.name}(${data.su.e.num})
                </div>`;
        });
        document.getElementById("list").innerHTML = content;
    });
}
window.onload = fetchRecords;
</script>
</body>
</html>
