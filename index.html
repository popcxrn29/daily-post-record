<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบจัดการโพสต์ทรัพย์ (สุ่ม & บันทึก)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4A90E2; --secondary: #27ae60; --orange: #f39c12; --bg: #f4f7f6; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #fff; width: 100%; max-width: 480px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 20px; box-sizing: border-box; margin-bottom: 15px; }
        
        /* สุ่ม */
        .random-btn-box { background: linear-gradient(135deg, #6e8efb, #a777e3); padding: 20px; border-radius: 15px; text-align: center; color: white; }
        .btn-main { background: white; color: #6e8efb; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; }
        
        /* รายการที่ต้องกรอก */
        .pending-section { border: 2px solid var(--primary); border-radius: 15px; padding: 15px; margin-top: 15px; display: none; }
        .row { display: grid; grid-template-columns: 45px 1fr 60px; gap: 8px; margin-bottom: 10px; align-items: center; }
        .time-label { font-size: 0.8rem; color: #888; font-weight: bold; }
        input[type="text"] { padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; background: #f9f9f9; }
        input[type="number"] { padding: 8px; border: 1px solid var(--primary); border-radius: 8px; text-align: center; font-weight: bold; }
        
        .btn-save { background: var(--secondary); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* ประวัติ */
        .history-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--secondary); width: 100%; max-width: 480px; box-sizing: border-box; }
        .h-date { font-weight: bold; color: #333; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px; display: block; }
        .person-info { font-size: 0.85rem; margin-top: 5px; color: #555; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <div style="text-align:center; margin-bottom:15px;">
        <input id="date" type="date" style="padding:8px; border-radius:8px; border:1px solid #ddd;">
    </div>
    
    <div class="random-btn-box" id="randomBox">
        <div style="margin-bottom:10px; font-weight:bold;">🎡 ยังไม่มีข้อมูลของวันนี้</div>
        <button class="btn-main" onclick="startRandom()">🎲 กดสุ่มทรัพย์และจองเวลา</button>
    </div>

    <div id="inputSection" class="pending-section">
        <div style="font-weight:bold; color:var(--primary); margin-bottom:10px; text-align:center;">✍️ ลงจำนวนโพสต์ของวันนี้</div>
        
        <div style="color:var(--primary); font-weight:bold; font-size:0.9rem;">👤 พี่ขวัญ</div>
        <div class="row"><span class="time-label">เช้า</span><input id="kw_m_name" type="text" readonly><input id="kw_m_num" type="number" placeholder="0"></div>
        <div class="row"><span class="time-label">เที่ยง</span><input id="kw_n_name" type="text" readonly><input id="kw_n_num" type="number" placeholder="0"></div>
        <div class="row"><span class="time-label">เย็น</span><input id="kw_e_name" type="text" readonly><input id="kw_e_num" type="number" placeholder="0"></div>
        
        <div style="color:var(--orange); font-weight:bold; font-size:0.9rem; margin-top:10px;">👤 พี่สุ</div>
        <div class="row"><span class="time-label">เช้า</span><input id="su_m_name" type="text" readonly><input id="su_m_num" type="number" placeholder="0"></div>
        <div class="row"><span class="time-label">เที่ยง</span><input id="su_n_name" type="text" readonly><input id="su_n_num" type="number" placeholder="0"></div>
        <div class="row"><span class="time-label">เย็น</span><input id="su_e_name" type="text" readonly><input id="su_e_num" type="number" placeholder="0"></div>
        
        <button class="btn-save" onclick="updateNumbers()">💾 บันทึกจำนวนโพสต์ทั้งหมด</button>
    </div>
</div>

<div id="historyList" style="width:100%; max-width:480px;"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCSncboyEoURJMOSx9fk8qEClmuQ_PgwDI",
  authDomain: "save-data-92eca.firebaseapp.com",
  projectId: "save-data-92eca",
  storageBucket: "save-data-92eca.firebasestorage.app",
  messagingSenderId: "661096454777",
  appId: "1:661096454777:web:d8b4297db798e14b76d2a8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const allAssets = ["บ้านพี่แดง อรัญนคร3", "แม่ย่าพี่ปลา 14 ไร่", "แม่ย่าพี่ปลา 11 ไร่", "พี่ศรีไพร (คอนสาย)", "พี่แอน ห้องเช่า 3 ห้อง", "พี่แอน ห้องเช่า 9 ห้อง", "ที่ดินน้าจิต วังน้ำเย็น", "บ้านอรัญนคร 1 (คุณแคท )", "คอนโดชีวาทัย ฮอล์มาร์ค ลาดพร้าว-โชคชัย4(ฝน)", "ที่ดิน หลังอรัญนคร 1 ซ.ประสบโชค", "บ้านพี่หนึ่ง อรัญวิลล์", "ที่ดินราชพัสดุ พี่แอน", "บ้านเอื้อ 214/278", "บ้านเอื้ื้อ 214/381", "บ้านเอื้อ 214/293", "โกดัง 1 ไร่ (พี่แอน)", "คอนโด The Base Park East Sukhumvit 77", "คอนโด Aston", "ที่ดินบ้านนา นครนายก", "บ้านพรสิริ ขอนแก่น", "บ้านพี่ปองพระประแดง", "แฮปปี้คอนโด", "บ้านทาวน์โฮมพฤกษา9", "BANGKOK HORIZON รามคำแหง", "THE IRIS ศรีนครินทร์ - พระราม 9", "กรี เน่ คอนโดดอนเมือง-สรงประภา เฟส1"];

let currentDocId = null;

// 1. เริ่มสุ่มและบันทึกชื่อทันที
function startRandom() {
    const dateVal = document.getElementById("date").value;
    let temp = [...allAssets]; let chosen = [];
    for (let i = 0; i < 3; i++) {
        const idx = Math.floor(Math.random() * temp.length);
        chosen.push(temp.splice(idx, 1)[0]);
    }
    const data = {
        date: dateVal,
        kw: { m: {name: chosen[0], num: 0}, n: {name: chosen[1], num: 0}, e: {name: chosen[2], num: 0} },
        su: { m: {name: chosen[1], num: 0}, n: {name: chosen[2], num: 0}, e: {name: chosen[0], num: 0} },
        status: "pending"
    };
    db.collection("posts").add(data).then(() => { checkTodayRecord(); });
}

// 2. ตรวจสอบว่าวันนี้สุ่มไปหรือยัง
function checkTodayRecord() {
    const dateVal = document.getElementById("date").value;
    db.collection("posts").where("date", "===", dateVal).limit(1).get().then(snap => {
        if (!snap.empty) {
            const doc = snap.docs[0];
            const d = doc.data();
            currentDocId = doc.id;
            document.getElementById("randomBox").style.display = "none";
            document.getElementById("inputSection").style.display = "block";
            // เติมชื่อทรัพย์ที่เคยสุ่มไว้
            document.getElementById("kw_m_name").value = d.kw.m.name;
            document.getElementById("kw_n_name").value = d.kw.n.name;
            document.getElementById("kw_e_name").value = d.kw.e.name;
            document.getElementById("su_m_name").value = d.su.m.name;
            document.getElementById("su_n_name").value = d.su.n.name;
            document.getElementById("su_e_name").value = d.su.e.name;
        } else {
            document.getElementById("randomBox").style.display = "block";
            document.getElementById("inputSection").style.display = "none";
        }
    });
}

// 3. อัปเดตเฉพาะจำนวนตัวเลข
function updateNumbers() {
    db.collection("posts").doc(currentDocId).update({
        "kw.m.num": document.getElementById("kw_m_num").value || 0,
        "kw.n.num": document.getElementById("kw_n_num").value || 0,
        "kw.e.num": document.getElementById("kw_e_num").value || 0,
        "su.m.num": document.getElementById("su_m_num").value || 0,
        "su.n.num": document.getElementById("su_n_num").value || 0,
        "su.e.num": document.getElementById("su_e_num").value || 0,
        status: "completed"
    }).then(() => { alert("อัปเดตยอดเรียบร้อย!"); location.reload(); });
}

function loadHistory() {
    db.collection("posts").orderBy("date", "desc").limit(5).get().then(snap => {
        let html = "";
        snap.forEach(doc => {
            const d = doc.data();
            html += `<div class="history-card">
                <span class="h-date">📅 วันที่ ${d.date}</span>
                <div class="person-info"><b>ขวัญ:</b> ${d.kw.m.name}(${d.kw.m.num}), ${d.kw.n.name}(${d.kw.n.num}), ${d.kw.e.name}(${d.kw.e.num})</div>
                <div class="person-info"><b>สุ:</b> ${d.su.m.name}(${d.su.m.num}), ${d.su.n.name}(${d.su.n.num}), ${d.su.e.name}(${d.su.e.num})</div>
            </div>`;
        });
        document.getElementById("historyList").innerHTML = html;
    });
}

window.onload = () => {
    document.getElementById("date").value = new Date().toISOString().split('T')[0];
    checkTodayRecord();
    loadHistory();
};
document.getElementById("date").addEventListener("change", checkTodayRecord);
</script>
</body>
</html>
