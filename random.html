<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎡 ระบบสุ่มทรัพย์รายวัน</title>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --bg: #f8f9fa; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; text-align: center; }
        h2 { color: var(--primary); margin: 0 0 5px 0; font-size: 1.5rem; }
        p.subtitle { color: #666; font-size: 0.85rem; margin-bottom: 20px; }
        
        .result-item { 
            background: #fff; border: 2px solid #eee; padding: 15px; border-radius: 15px; 
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; color: #202124; text-align: left; transition: 0.3s;
        }
        .result-item.active { border-color: var(--primary); background: #e8f0fe; }
        
        .copy-btn { 
            background: #f1f3f4; border: none; padding: 6px 12px; border-radius: 8px; 
            font-size: 0.75rem; cursor: pointer; color: #5f6368;
        }
        .copy-btn:active { background: #dadce0; }

        button.main-btn { 
            width: 100%; padding: 18px; background: var(--success); color: white; border: none; 
            border-radius: 18px; font-size: 1.2rem; font-weight: bold; cursor: pointer; 
            margin-top: 5px; box-shadow: 0 4px 15px rgba(52, 168, 83, 0.3);
        }
        button.main-btn:active { transform: scale(0.96); }

        .all-copy { margin-top: 15px; color: var(--primary); font-size: 0.9rem; text-decoration: underline; cursor: pointer; display: none; }
        .footer-info { margin-top: 20px; font-size: 0.8rem; color: #9aa0a6; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎡 สุ่มทรัพย์วันนี้</h2>
    <p class="subtitle">สุ่มให้ 3 รายการ ไม่ซ้ำกันแน่นอน</p>
    
    <div id="results">
        <div class="result-item" id="res1"><span>1. รอสุ่ม...</span><button class="copy-btn" onclick="copyOne(1)">คัดลอก</button></div>
        <div class="result-item" id="res2"><span>2. รอสุ่ม...</span><button class="copy-btn" onclick="copyOne(2)">คัดลอก</button></div>
        <div class="result-item" id="res3"><span>3. รอสุ่ม...</span><button class="copy-btn" onclick="copyOne(3)">คัดลอก</button></div>
    </div>

    <button class="main-btn" onclick="randomNow()">🎲 กดสุ่มทรัพย์เลย!</button>
    <div id="copyAllLink" class="all-copy" onclick="copyAll()">📋 คัดลอกทั้ง 3 รายการรวดเดียว</div>

    <div class="footer-info">
        คลังทรัพย์ทั้งหมด: <b id="totalCount">0</b> รายการ
    </div>
</div>

<script>
    // 🏠 รายชื่อทรัพย์ทั้งหมด (อัปเดตล่าสุด 26 รายการ)
    const myAssets = [
        "บ้านพี่แดง อรัญนคร3", "แม่ย่าพี่ปลา 14 ไร่", "แม่ย่าพี่ปลา 11 ไร่", "พี่ศรีไพร (คอนสาย)",
        "พี่แอน ห้องเช่า 3 ห้อง", "พี่แอน ห้องเช่า 9 ห้อง", "ที่ดินน้าจิต วังน้ำเย็น", "บ้านอรัญนคร 1 (คุณแคท )",
        "คอนโดชีวาทัย ฮอล์มาร์ค ลาดพร้าว-โชคชัย4(ฝน)", "ที่ดิน หลังอรัญนคร 1 ซ.ประสบโชค", 
        "บ้านพี่หนึ่ง อรัญวิลล์", "ที่ดินราชพัสดุ พี่แอน", "บ้านเอื้อ 214/278", "บ้านเอื้ื้อ 214/381",
        "บ้านเอื้อ 214/293", "โกดัง 1 ไร่ (พี่แอน)", "คอนโด The Base Park East Sukhumvit 77",
        "คอนโด Aston", "ที่ดินบ้านนา นครนายก", "บ้านพรสิริ ขอนแก่น", "บ้านพี่ปองพระประแดง",
        "แฮปปี้คอนโด", "บ้านทาวน์โฮมพฤกษา9", "BANGKOK HORIZON รามคำแหง",
        "THE IRIS ศรีนครินทร์ - พระราม 9", "กรี เน่ คอนโดดอนเมือง-สรงประภา เฟส1"
    ];

    document.getElementById('totalCount').innerText = myAssets.length;
    let lastChosen = [];

    function randomNow() {
        let temp = [...myAssets];
        lastChosen = [];
        
        for (let i = 0; i < 3; i++) {
            const idx = Math.floor(Math.random() * temp.length);
            lastChosen.push(temp.splice(idx, 1)[0]);
        }

        for (let i = 1; i <= 3; i++) {
            const el = document.getElementById('res' + i);
            el.querySelector('span').innerText = i + ". " + lastChosen[i-1];
            el.classList.add('active');
        }
        document.getElementById('copyAllLink').style.display = 'block';
    }

    function copyOne(num) {
        const text = lastChosen[num-1];
        if(!text) return;
        navigator.clipboard.writeText(text);
        alert("คัดลอกแล้ว: " + text);
    }

    function copyAll() {
        const textToCopy = lastChosen.map((item, index) => (index + 1) + ". " + item).join('\n');
        navigator.clipboard.writeText(textToCopy);
        alert("คัดลอกทั้ง 3 รายการแล้วครับ!");
    }
</script>

</body>
</html>
