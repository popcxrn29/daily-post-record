<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎡 สุ่มทรัพย์ & บันทึก</title>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --bg: #f8f9fa; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; text-align: center; }
        h2 { color: var(--primary); margin: 0; font-size: 1.5rem; }
        .result-item { 
            background: #fff; border: 2px solid #eee; padding: 12px; border-radius: 12px; 
            margin-top: 10px; font-weight: bold; color: #202124; text-align: left;
        }
        button.main-btn { 
            width: 100%; padding: 18px; background: var(--success); color: white; border: none; 
            border-radius: 18px; font-size: 1.2rem; font-weight: bold; cursor: pointer; 
            margin-top: 15px; box-shadow: 0 4px 15px rgba(52, 168, 83, 0.3);
        }
        button.main-btn:disabled { background: #ccc; box-shadow: none; }
        .history-section { width: 100%; max-width: 400px; margin-top: 20px; }
        .history-card { background: #fff; padding: 12px; border-radius: 12px; margin-bottom: 8px; font-size: 0.85rem; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="card">
    <h2>🎡 สุ่มทรัพย์รายวัน</h2>
    <p style="font-size: 0.8rem; color: #666;">สุ่มปุ๊บ บันทึกลงฐานข้อมูลปั๊บ!</p>
    
    <div id="results">
        <div class="result-item" id="res1">1. รอสุ่ม...</div>
        <div class="result-item" id="res2">2. รอสุ่ม...</div>
        <div class="result-item" id="res3">3. รอสุ่ม...</div>
    </div>

    <button id="btnRandom" class="main-btn" onclick="randomAndSave()">🎲 สุ่มและบันทึกข้อมูล</button>
</div>

<div class="history-section">
    <p style="font-weight: bold; color: #555;">📋 ประวัติการสุ่มล่าสุด</p>
    <div id="historyList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCSncboyEoURJMOSx9fk8qEClmuQ_PgwDI",
        authDomain: "save-data-92eca.firebaseapp.com",
        projectId: "save-data-92eca",
        storageBucket: "save-data-92eca.firebasestorage.app",
        messagingSenderId: "661096454777",
        appId: "1:661096454777:web:d8b4297db798e14b76d2a8"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const myAssets = [
        "บ้านพี่แดง อรัญนคร3", "แม่ย่าพี่ปลา 14 ไร่", "แม่ย่าพี่ปลา 11 ไร่", "พี่ศรีไพร (คอนสาย)",
        "พี่แอน ห้องเช่า 3 ห้อง", "พี่แอน ห้องเช่า 9 ห้อง", "ที่ดินน้าจิต วังน้ำเย็น", "บ้านอรัญนคร 1 (คุณแคท )",
        "คอนโดชีวาทัย ฮอล์มาร์ค ลาดพร้าว-โชคชัย4(ฝน)", "ที่ดิน หลังอรัญนคร 1 ซ.ประสบโชค", 
        "บ้านพี่หนึ่ง อรัญวิลล์", "ที่ดินราชพัสดุ พี่แอน", "บ้านเอื้อ 214/278", "บ้านเอื้ื้อ 214/381",
        "บ้านเอื้อ 214/293", "โกดัง 1 ไร่ (พี่แอน)", "คอนโด The Base Park East Sukhumvit 77",
        "คอนโด Aston", "ที่ดินบ้านนา นครนายก", "บ้านพรสิริ ขอนแก่น", "บ้านพี่ปองพระประแดง",
        "แฮปปี้คอนโด", "บ้านทาวน์โฮมพฤกษา9", "BANGKOK HORIZON รามคำแหง",
        "THE IRIS ศรีนครินทร์ - พระราม 9", "กรี เน่ คอนโดดอนเมือง-สรงประภา เฟส1"
    ];

    function randomAndSave() {
        const btn = document.getElementById('btnRandom');
        btn.disabled = true;
        btn.innerText = "กำลังบันทึก...";

        let temp = [...myAssets];
        let chosen = [];
        for (let i = 0; i < 3; i++) {
            const idx = Math.floor(Math.random() * temp.length);
            chosen.push(temp.splice(idx, 1)[0]);
        }

        // แสดงผลบนหน้าจอ
        document.getElementById('res1').innerText = "1. " + chosen[0];
        document.getElementById('res2').innerText = "2. " + chosen[1];
        document.getElementById('res3').innerText = "3. " + chosen[2];

        // บันทึกลง Firebase
        const today = new Date();
        const dateString = today.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });

        db.collection("random_history").add({
            date: dateString,
            items: chosen,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            alert("บันทึกประวัติการสุ่มเรียบร้อย!");
            btn.disabled = false;
            btn.innerText = "🎲 สุ่มและบันทึกข้อมูล";
            loadHistory();
        });
    }

    function loadHistory() {
        db.collection("random_history").orderBy("timestamp", "desc").limit(5).get().then((snap) => {
            let html = "";
            snap.forEach(doc => {
                const d = doc.data();
                html += `<div class="history-card">
                    <b>🗓 ${d.date}</b><br>
                    ${d.items.join(', ')}
                </div>`;
            });
            document.getElementById('historyList').innerHTML = html;
        });
    }
    window.onload = loadHistory;
</script>
</body>
</html>
